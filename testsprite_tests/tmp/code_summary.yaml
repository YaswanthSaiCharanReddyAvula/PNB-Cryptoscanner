version: "2"
type: backend
tech_stack:
  - Python 3.11+
  - FastAPI
  - MongoDB (Motor async)
  - PostgreSQL (async auth path, optional)
  - WebSockets (scan progress)
features:
  - name: Scanner API
    description: Async cryptographic scan pipeline, batch scans, WebSocket updates, results by domain.
    files:
      - Backend/app/api/routes.py
      - Backend/app/main.py
    endpoints:
      - method: POST
        path: /api/v1/scan
        description: Queue a full asynchronous scan for a domain
        auth_required: true
        response_schema:
          "202": "scan_id, domain, status"
      - method: POST
        path: /api/v1/scan/batch
        description: Queue portfolio scans for multiple domains
        auth_required: true
        response_schema:
          "202": "batch_id, jobs"
      - method: GET
        path: /api/v1/results/{domain}
        description: Latest scan document for a domain
        auth_required: true
        response_schema:
          "200": object
      - method: GET
        path: /api/v1/scans/history
        description: Recent scans for a domain
        auth_required: true
        response_schema:
          "200": object
      - method: GET
        path: /api/v1/scans/diff
        description: Compare two scans (TLS/asset deltas)
        auth_required: true
        response_schema:
          "200": object
    depends_on:
      - MongoDB
      - External recon tools (subfinder, etc.) on host
  - name: CBOM & Crypto Dashboard
    description: CBOM summary, charts, per-app components, crypto security table.
    files:
      - Backend/app/api/routes.py
    endpoints:
      - method: GET
        path: /api/v1/cbom/summary
        description: CBOM summary stats (optional domain filter)
        auth_required: true
        response_schema:
          "200": object
      - method: GET
        path: /api/v1/cbom/per-app
        description: Per-component CBOM with threat/NIST enrichment
        auth_required: true
        response_schema:
          "200": array
      - method: GET
        path: /api/v1/cbom/charts
        description: Chart data for key lengths, CAs, ciphers
        auth_required: true
        response_schema:
          "200": object
      - method: GET
        path: /api/v1/crypto/security
        description: TLS/crypto rows for dashboard
        auth_required: true
        response_schema:
          "200": array
    depends_on:
      - MongoDB
  - name: PQC Posture & Quantum Score
    description: PQC posture, vulnerable algorithms, cyber rating, what-if simulation.
    files:
      - Backend/app/api/routes.py
      - Backend/app/modules/threat_nist_mapping.py
    endpoints:
      - method: GET
        path: /api/v1/pqc/posture
        description: Asset-level PQC posture from latest scan
        auth_required: true
        response_schema:
          "200": object
      - method: GET
        path: /api/v1/cyber-rating
        description: Enterprise-style 0–1000 rating from latest scan
        auth_required: true
        response_schema:
          "200": object
      - method: POST
        path: /api/v1/quantum-score/simulate
        description: Heuristic what-if quantum score projection
        auth_required: true
        response_schema:
          "200": object
    depends_on:
      - MongoDB
  - name: Portfolio & Inventory
    description: Deduplicated inventory, asset metadata CRUD.
    files:
      - Backend/app/api/routes.py
    endpoints:
      - method: GET
        path: /api/v1/inventory/summary
        description: Deduplicated hosts across completed scans
        auth_required: true
        response_schema:
          "200": object
      - method: PUT
        path: /api/v1/assets/metadata
        description: Upsert host metadata (owner/env/criticality)
        auth_required: true
        response_schema:
          "200": object
    depends_on:
      - MongoDB
  - name: Reporting & Threat Model
    description: JSON export bundle, migration roadmap, threat summary, NIST catalog.
    files:
      - Backend/app/api/routes.py
    endpoints:
      - method: GET
        path: /api/v1/reports/export-bundle
        description: Audit JSON bundle (CBOM, TLS, score)
        auth_required: true
        response_schema:
          "200": object
      - method: GET
        path: /api/v1/migration/roadmap
        description: Phased waves and prioritized backlog
        auth_required: true
        response_schema:
          "200": object
      - method: GET
        path: /api/v1/threat-model/summary
        description: Shor/Grover/HNDL context + scan counts
        auth_required: true
        response_schema:
          "200": object
    depends_on:
      - MongoDB
  - name: Admin Phase 4
    description: Org crypto policy, integrations webhooks, export audit log.
    files:
      - Backend/app/api/routes.py
    endpoints:
      - method: GET
        path: /api/v1/admin/policy
        description: Read org policy targets
        auth_required: true
        response_schema:
          "200": object
      - method: PUT
        path: /api/v1/admin/policy
        description: Update policy (admin)
        auth_required: true
        response_schema:
          "200": object
      - method: GET
        path: /api/v1/admin/exports/history
        description: Export audit events
        auth_required: true
        response_schema:
          "200": object
    depends_on:
      - MongoDB
  - name: Migration Phase 5
    description: Migration tasks and waivers CRUD; seed from backlog.
    files:
      - Backend/app/api/routes.py
    endpoints:
      - method: GET
        path: /api/v1/migration/tasks
        description: List migration tasks
        auth_required: true
        response_schema:
          "200": object
      - method: POST
        path: /api/v1/migration/tasks
        description: Create task
        auth_required: true
        response_schema:
          "200": object
      - method: GET
        path: /api/v1/migration/waivers
        description: List waivers
        auth_required: true
        response_schema:
          "200": object
    depends_on:
      - MongoDB
  - name: Authentication
    description: Demo login returning JWT-style bearer for dashboard API.
    files:
      - Backend/app/api/routes.py
    endpoints:
      - method: POST
        path: /api/v1/auth/login
        description: Demo login (username/email + password)
        auth_required: false
        response_schema:
          "200": object
    depends_on:
      - MongoDB
known_limitations:
  - issue: MongoDB must be reachable at startup; /health may still return healthy while DB ops fail if misconfigured
    location: Backend/app/db/connection.py
    impact: API routes depending on get_database() fail without MongoDB
  - issue: Full scan pipeline depends on external CLI tools and network access to targets
    location: Backend/app/modules/asset_discovery.py
    impact: Scans may timeout or return partial results in restricted environments
